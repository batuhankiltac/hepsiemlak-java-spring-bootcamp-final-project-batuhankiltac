server.port = 8083

# MYSQL
spring.jpa.properties.javax.persistence.validation.mode = none
spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER
spring.jpa.show-sql = true
spring.data.jpa.repositories.bootstrap-mode = default
spring.jpa.hibernate.ddl-auto = update
spring.datasource.url = jdbc:mysql://localhost:3306/emlakburada-payment
spring.datasource.username = root
spring.datasource.password = mysql1234

#RABBITMQ
spring.rabbitmq.host = localhost
spring.rabbitmq.port = 5672
spring.rabbitmq.username = admin
spring.rabbitmq.password = 123456
rabbitmq.exchange = payment.exchange
rabbitmq.queue = emlakburada.payment
rabbitmq.routingkey = payment.routingkey

spring.main.allow-bean-definition-overriding=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true